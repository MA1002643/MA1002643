<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Featured project: Full-Stack Recipe Platform — a Vue 3 single-page app with an Express and SQLite REST API, Swagger-documented, tested with Mocha and Chai." viewBox="0 0 1200 260" width="1200" height="260" preserveAspectRatio="xMidYMid meet" text-rendering="geometricPrecision">
  <title>Featured Project — Full-Stack Recipe Platform</title>
  <desc>Light featured-project card with title, repo slug, accent keyline, two-line description, and technology chips.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FBFCFD"/>
      <stop offset="100%" stop-color="#F6F8FA"/>
    </linearGradient>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#D8DEE4" stroke-width="0.6"/>
    </pattern>

    <radialGradient id="glow" cx="18%" cy="0%" r="60%">
      <stop offset="0%"  stop-color="#FF652F" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#FF652F" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FF652F" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF652F"/>
      <stop offset="100%" stop-color="#FFC857"/>
    </linearGradient>

    <clipPath id="cardClip">
      <rect x="1" y="1" width="1198" height="258" rx="16"/>
    </clipPath>

    <style>
      @media (prefers-reduced-motion: reduce){ * { animation:none !important; transition:none !important } }
    </style>
  </defs>

  <!-- ===== CARD SURFACE ===== -->
  <g clip-path="url(#cardClip)">
    <rect x="1" y="1" width="1198" height="258" fill="url(#bg)"/>
    <rect x="1" y="1" width="1198" height="258" fill="url(#grid)" opacity="0.35"/>
    <rect x="1" y="1" width="1198" height="258" fill="url(#glow)"/>
  </g>
  <rect x="1" y="1" width="1198" height="258" rx="16" fill="none" stroke="#D0D7DE" stroke-width="1.5"/>

  <!-- ===== CONTENT ===== -->
  <g font-family="Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>

    <!-- header -->
    <text x="48" y="76" font-size="27" font-weight="800" fill="#0C1A25">🍳 Full-Stack Recipe Platform</text>
    <text x="1152" y="76" font-size="14" font-weight="500" fill="#0969DA" text-anchor="end" opacity="0">View repository →
      <animate attributeName="opacity" values="0;0.9" dur="0.5s" begin="0.9s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
    </text>
    <text x="48" y="103" font-size="13.5" fill="#57606A"
          font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace">~/ai-powered-recipe-search-platform</text>

    <!-- keyline with accent segment -->
    <line x1="48" y1="120" x2="1152" y2="120" stroke="#D8DEE4" stroke-width="1" opacity="0.9"/>
    <rect x="48" y="118.5" width="0" height="3" rx="1.5" fill="url(#acc)">
      <animate attributeName="width" values="0;120" dur="0.55s" begin="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </rect>

    <!-- description -->
    <g font-size="16" fill="#4B5563">
      <text x="48" y="152">A <tspan font-weight="600" fill="#0C1A25">Vue 3</tspan> single-page app backed by an <tspan font-weight="600" fill="#0C1A25">Express + SQLite</tspan> REST API — user signup &amp; login,</text>
      <text x="48" y="178">recipe creation, browsing and ratings, with a <tspan font-weight="600" fill="#0C1A25">Swagger</tspan>-documented API and a <tspan font-weight="600" fill="#0C1A25">Mocha/Chai</tspan> test suite.</text>
    </g>

    <!-- tech chips (textLength pins label widths so padding holds on every platform's fallback font) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.75s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <g font-size="13" font-weight="500" fill="#24292F">
        <rect x="48" y="202" width="76" height="28" rx="14" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1"/>
        <circle cx="65.5" cy="216" r="3.5" fill="#34A26E"/>
        <text x="77" y="220.5" textLength="33" lengthAdjust="spacingAndGlyphs">Vue 3</text>

        <rect x="134" y="202" width="70" height="28" rx="14" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1"/>
        <circle cx="151.5" cy="216" r="3.5" fill="#646CFF"/>
        <text x="163" y="220.5" textLength="27" lengthAdjust="spacingAndGlyphs">Vite</text>

        <rect x="214" y="202" width="92" height="28" rx="14" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1"/>
        <circle cx="231.5" cy="216" r="3.5" fill="#57606A"/>
        <text x="243" y="220.5" textLength="49" lengthAdjust="spacingAndGlyphs">Express</text>

        <rect x="316" y="202" width="87" height="28" rx="14" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1"/>
        <circle cx="333.5" cy="216" r="3.5" fill="#0969DA"/>
        <text x="345" y="220.5" textLength="44" lengthAdjust="spacingAndGlyphs">SQLite</text>

        <rect x="413" y="202" width="98" height="28" rx="14" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1"/>
        <circle cx="430.5" cy="216" r="3.5" fill="#4D9E0C"/>
        <text x="442" y="220.5" textLength="55" lengthAdjust="spacingAndGlyphs">Swagger</text>
      </g>
    </g>
  </g>
</svg>
