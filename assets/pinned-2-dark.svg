    <clipPath id="cardClip"><rect x="1" y="1" width="598" height="188" rx="14"/></clipPath>
    <style>@media (prefers-reduced-motion: reduce){ * { animation:none !important; transition:none !important } }</style>
  </defs>

  <g clip-path="url(#cardClip)">
