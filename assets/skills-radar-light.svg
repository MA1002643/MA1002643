<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skills radar chart showing relative self-assessed strengths across Backend/.NET, Frontend, Databases, Cloud/DevOps, Testing and Automation" viewBox="0 0 900 440" width="900" height="440" text-rendering="geometricPrecision">
  <title>Skills Radar — Muhammad Abdullah</title>
  <desc>Hexagonal radar chart with six axes — strongest in Backend/.NET, Automation and Frontend, developing in Databases, Cloud/DevOps and Testing — four concentric rings, an animated data polygon and a continuous radar sweep.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FBFCFD"/>
      <stop offset="100%" stop-color="#F6F8FA"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-70 -30" to="70 30" dur="18s" begin="0.6s" repeatCount="indefinite" additive="sum"/>
    </linearGradient>

    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#E6EAEF" stroke-width="0.5" opacity="0.8"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="30 0" dur="28s" begin="1s" repeatCount="indefinite"/>
    </pattern>

    <linearGradient id="accLine" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF652F"/>
      <stop offset="100%" stop-color="#D98324"/>
    </linearGradient>

    <radialGradient id="dataFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF652F" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FF652F" stop-opacity="0.08"/>
    </radialGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF652F" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FF652F" stop-opacity="0"/>
    </radialGradient>

    <!-- Radar sweep wedge: accent fading to transparent -->
    <linearGradient id="sweepGrad" x1="450" y1="232" x2="450" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D98324" stop-opacity="0"/>
      <stop offset="55%" stop-color="#FF652F" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF652F" stop-opacity="0.40"/>
    </linearGradient>

    <style>
      @media (prefers-reduced-motion: reduce){ * { animation:none !important; transition:none !important } }
    </style>
  </defs>

  <!-- Background panel -->
  <rect width="900" height="440" fill="#FFFFFF"/>
  <rect x="14" y="14" width="872" height="412" rx="16" fill="url(#bg)" stroke="#D0D7DE" stroke-width="1"/>
  <rect x="14" y="14" width="872" height="412" rx="16" fill="url(#grid)"/>

  <!-- Panel header -->
  <g font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace">
    <rect x="44" y="40" width="10" height="10" rx="2" fill="url(#accLine)"/>
    <text x="64" y="49" font-size="13" letter-spacing="3" fill="#57606A" font-weight="600">SKILLS RADAR</text>
  </g>

  <!-- ===================== RADAR ===================== -->
  <g transform="translate(-46 0)">
    <!-- center glow -->
    <circle cx="450" cy="232" r="150" fill="url(#centerGlow)"/>

    <!-- concentric hex rings -->
    <g fill="none" stroke="#E6EAEF" stroke-width="1">
      <polygon points="450.0,196.5 480.7,214.2 480.7,249.8 450.0,267.5 419.3,249.8 419.3,214.2"/>
      <polygon points="450.0,161.0 511.5,196.5 511.5,267.5 450.0,303.0 388.5,267.5 388.5,196.5"/>
      <polygon points="450.0,125.5 542.2,178.8 542.2,285.2 450.0,338.5 357.8,285.2 357.8,178.8"/>
      <polygon points="450.0,90.0 573.0,161.0 573.0,303.0 450.0,374.0 327.0,303.0 327.0,161.0" stroke="#D0D7DE"/>
    </g>

    <!-- spokes -->
    <g stroke="#E6EAEF" stroke-width="1">
      <line x1="450" y1="232" x2="450.0" y2="90.0"/>
      <line x1="450" y1="232" x2="573.0" y2="161.0"/>
      <line x1="450" y1="232" x2="573.0" y2="303.0"/>
      <line x1="450" y1="232" x2="450.0" y2="374.0"/>
      <line x1="450" y1="232" x2="327.0" y2="303.0"/>
      <line x1="450" y1="232" x2="327.0" y2="161.0"/>
    </g>

    <!-- rotating radar sweep -->
    <g>
      <polygon points="450,232 450,90 484.5,98.3" fill="url(#sweepGrad)" opacity="0.9">
        <animateTransform attributeName="transform" type="rotate" from="0 450 232" to="360 450 232" dur="8s" repeatCount="indefinite"/>
      </polygon>
      <line x1="450" y1="232" x2="450" y2="90" stroke="#FF652F" stroke-width="1.5" stroke-opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0 450 232" to="360 450 232" dur="8s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- data polygon (scales up from center, entrance) -->
    <g>
      <polygon points="450.0,104.2 548.4,175.2 536.1,281.7 450.0,317.2 382.4,271.1 345.5,171.7"
               fill="url(#dataFill)" stroke="#FF652F" stroke-width="2" stroke-linejoin="round"
               transform="translate(450 232) scale(0.001) translate(-450 -232)">
        <animateTransform attributeName="transform" type="scale" additive="sum"
                          values="0.001;1.06;1" keyTimes="0;0.8;1" dur="0.8s" begin="0.5s" fill="freeze"
                          calcMode="spline" keySplines="0.16 1 0.3 1; 0.4 0 0.2 1"/>
      </polygon>
    </g>

    <!-- vertex dots -->
    <g fill="#D98324" stroke="#FFFFFF" stroke-width="1" opacity="0">
      <circle cx="450.0" cy="104.2" r="4"/>
      <circle cx="548.4" cy="175.2" r="4"/>
      <circle cx="536.1" cy="281.7" r="4"/>
      <circle cx="450.0" cy="317.2" r="4"/>
      <circle cx="382.4" cy="271.1" r="4"/>
      <circle cx="345.5" cy="171.7" r="4"/>
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.2s" fill="freeze"/>
    </g>

    <!-- center node -->
    <circle cx="450" cy="232" r="3" fill="#FF652F"/>

    <!-- axis labels -->
    <g font-family="Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif" font-size="13" font-weight="600" fill="#0C1A25">
      <text x="450" y="74" text-anchor="middle">Backend / .NET</text>
      <text x="585" y="156" text-anchor="start">Frontend</text>
      <text x="585" y="316" text-anchor="start">Databases</text>
      <text x="450" y="396" text-anchor="middle">Cloud / DevOps</text>
      <text x="315" y="316" text-anchor="end">Testing</text>
      <text x="315" y="156" text-anchor="end">Automation</text>
    </g>
  </g>

  <!-- ===================== SIDE LEGEND ===================== -->
  <g font-family="Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">
    <rect x="648" y="92" width="208" height="256" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
    <text x="668" y="118" font-size="12" letter-spacing="2" fill="#8B949E" font-family="'JetBrains Mono', ui-monospace, Menlo, monospace">PROFICIENCY</text>

    <g font-size="14">
      <g>
        <rect x="668" y="135" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="143" fill="#0C1A25">Backend / .NET</text>
        <rect x="668" y="150" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="150" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="151.2" dur="0.7s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
      <g>
        <rect x="668" y="170" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="178" fill="#0C1A25">Frontend</text>
        <rect x="668" y="185" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="185" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="134.4" dur="0.7s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
      <g>
        <rect x="668" y="205" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="213" fill="#0C1A25">Databases</text>
        <rect x="668" y="220" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="220" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="117.6" dur="0.7s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
      <g>
        <rect x="668" y="240" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="248" fill="#0C1A25">Cloud / DevOps</text>
        <rect x="668" y="255" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="255" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="100.8" dur="0.7s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
      <g>
        <rect x="668" y="275" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="283" fill="#0C1A25">Testing</text>
        <rect x="668" y="290" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="290" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="92.4" dur="0.7s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
      <g>
        <rect x="668" y="310" width="9" height="9" rx="2" fill="#FF652F"/>
        <text x="685" y="318" fill="#0C1A25">Automation</text>
        <rect x="668" y="325" width="168" height="4" rx="2" fill="#E6EAEF"/>
        <rect x="668" y="325" width="0" height="4" rx="2" fill="#FF652F">
          <animate attributeName="width" from="0" to="142.8" dur="0.7s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
        </rect>
      </g>
    </g>
  </g>

  <!-- caption bottom-right -->
  <text x="856" y="406" text-anchor="end" font-size="11" fill="#8B949E"
        font-family="Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif">self-assessed · relative scale</text>
</svg>
