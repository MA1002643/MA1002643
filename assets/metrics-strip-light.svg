<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Engineering metrics: years of experience, First-Class BSc (Hons) degree, full-stack engineer, 100% self-updating profile" viewBox="0 0 1200 150" width="1200" height="150">
  <title>Mission-Control Metrics Strip</title>
  <desc>Four metric tiles: years of experience (auto-updated by GitHub Actions), degree First-Class BSc (Hons), stack Full-Stack (.NET, Node, SQL), automation 100 percent self-updating.</desc>
  <defs>
    <linearGradient id="m-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0C1A25" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0C1A25" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0C1A25" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="m-shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF652F"/>
      <stop offset="0.5" stop-color="#D98324"/>
      <stop offset="1" stop-color="#FF652F"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="m-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0C1A25" flood-opacity="0.12"/>
    </filter>
    <clipPath id="m-clip"><rect x="0" y="0" width="1200" height="150" rx="16"/></clipPath>
  </defs>

  <style>
    .lbl { font-family: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace; font-size: 11px; letter-spacing: 1.5px; fill: #57606A; }
    .big { font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif; font-size: 29px; font-weight: 800; fill: #0C1A25; }
    .sub { font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif; font-size: 12px; fill: #8B949E; }
    .tile { opacity: 1; animation: rise 0.7s cubic-bezier(.2,.7,.2,1) both; }
    .t1 { animation-delay: .05s; } .t2 { animation-delay: .20s; } .t3 { animation-delay: .35s; } .t4 { animation-delay: .50s; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce){ * { animation: none !important; transition: none !important } .tile { opacity: 1; transform: none; } }
  </style>

  <rect x="0" y="0" width="1200" height="150" rx="16" fill="#FFFFFF"/>

  <!-- Tile 1 -->
  <g class="tile t1">
    <rect x="44" y="20" width="259" height="110" rx="12" fill="#FFFFFF" stroke="#D0D7DE" filter="url(#m-shadow)"/>
    <rect x="44" y="20" width="259" height="3" rx="1.5" fill="url(#m-shimmer)"/>
    <text class="lbl" x="173.5" y="48" text-anchor="middle">EXPERIENCE</text>
    <text class="big" x="173.5" y="90" text-anchor="middle" data-metric="experience">4 yrs</text>
    <text class="sub" x="173.5" y="114" text-anchor="middle">building &amp; shipping</text>
  </g>

  <!-- Tile 2 -->
  <g class="tile t2">
    <rect x="319" y="20" width="259" height="110" rx="12" fill="#FFFFFF" stroke="#D0D7DE" filter="url(#m-shadow)"/>
    <rect x="319" y="20" width="259" height="3" rx="1.5" fill="url(#m-shimmer)"/>
    <text class="lbl" x="448.5" y="48" text-anchor="middle">DEGREE</text>
    <text class="big" x="448.5" y="90" text-anchor="middle">1st Class</text>
    <text class="sub" x="448.5" y="114" text-anchor="middle">BSc (Hons)</text>
  </g>

  <!-- Tile 3 -->
  <g class="tile t3">
    <rect x="594" y="20" width="259" height="110" rx="12" fill="#FFFFFF" stroke="#D0D7DE" filter="url(#m-shadow)"/>
    <rect x="594" y="20" width="259" height="3" rx="1.5" fill="url(#m-shimmer)"/>
    <text class="lbl" x="723.5" y="48" text-anchor="middle">STACK</text>
    <text class="big" x="723.5" y="90" text-anchor="middle">Full-Stack</text>
    <text class="sub" x="723.5" y="114" text-anchor="middle">.NET &#183; Node &#183; SQL</text>
  </g>

  <!-- Tile 4 -->
  <g class="tile t4">
    <rect x="869" y="20" width="259" height="110" rx="12" fill="#FFFFFF" stroke="#D0D7DE" filter="url(#m-shadow)"/>
    <rect x="869" y="20" width="259" height="3" rx="1.5" fill="url(#m-shimmer)"/>
    <text class="lbl" x="998.5" y="48" text-anchor="middle">AUTOMATION</text>
    <text class="big" x="998.5" y="90" text-anchor="middle">100%</text>
    <text class="sub" x="998.5" y="114" text-anchor="middle">self-updating profile</text>
  </g>

  <!-- Ambient highlight sweep -->
  <g clip-path="url(#m-clip)">
    <rect x="-300" y="20" width="300" height="110" fill="url(#m-sweep)">
      <animate attributeName="x" values="-300;1200" dur="8s" begin="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
