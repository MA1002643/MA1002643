<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Live automation pipeline: GitHub Actions on a schedule keep every README section self-updating" viewBox="0 0 1200 360" width="1200" height="360">
  <title>Live Automation Pipeline</title>
  <desc>A self-updating CI/CD system. Scheduled GitHub Actions fan out to four workers — WakaTime coding time, activity feed, auto-pin top repos, experience metric — which converge into README.md and render the live profile.</desc>

  <style>
    .body { font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', 'Cascadia Code', Menlo, Consolas, monospace; }
    .title  { fill:#E5E7EB; font-size:22px; font-weight:700; letter-spacing:.2px; }
    .sub     { fill:#94A3B8; font-size:14px; font-weight:500; }
    .ntitle  { fill:#E5E7EB; font-size:14px; font-weight:600; }
    .nmono   { fill:#94A3B8; font-size:10.5px; letter-spacing:.4px; }
    .nmonoAcc{ fill:#FF652F; font-size:10.5px; letter-spacing:.4px; }

    .enter { opacity:1; }
    .e0 { animation: rise .7s cubic-bezier(.22,1,.36,1) .15s both; }
    .e1 { animation: rise .7s cubic-bezier(.22,1,.36,1) .30s both; }
    .e2 { animation: rise .7s cubic-bezier(.22,1,.36,1) .45s both; }
    .e3 { animation: rise .7s cubic-bezier(.22,1,.36,1) .60s both; }
    .e4 { animation: rise .7s cubic-bezier(.22,1,.36,1) .75s both; }
    .e5 { animation: rise .7s cubic-bezier(.22,1,.36,1) .90s both; }
    .e6 { animation: rise .7s cubic-bezier(.22,1,.36,1) 1.05s both; }
    @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .pulse  { animation: pulse 6.5s ease-in-out infinite; transform-origin:center; transform-box:fill-box; }
    @keyframes pulse { 0%,100%{ opacity:.35; } 50%{ opacity:.85; } }

    .shimmer { animation: shimmer 8s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{ opacity:.25; } 50%{ opacity:.6; } }

    @media (prefers-reduced-motion: reduce){ * { animation:none !important; transition:none !important } }
  </style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF652F"/>
      <stop offset="1" stop-color="#FFC857"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF652F" stop-opacity=".55"/>
      <stop offset="1" stop-color="#FF652F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3FB950" stop-opacity=".55"/>
      <stop offset="1" stop-color="#3FB950" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1E293B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)" class="shimmer"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="16" fill="none" stroke="#243042"/>

  <!-- title row -->
  <g class="enter e0">
    <text x="44" y="44" class="body title">This profile is a self-updating system</text>
    <text x="44" y="68" class="body sub">GitHub Actions keep every section live on a schedule</text>
  </g>
  <g class="enter e0">
    <rect x="1012" y="30" width="144" height="28" rx="14" fill="#111827" stroke="#243042"/>
    <circle cx="1031" cy="44" r="4" fill="#3FB950"><animate attributeName="opacity" values="1;.3;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <text x="1043" y="48" class="mono nmono" fill="#3FB950">pipeline · live</text>
  </g>

  <!-- ===================== EDGES ===================== -->
  <!-- worker node centres: y = 130,180,230,280 ; left x ~ 408 ; right x ~ 408+232=640 -->
  <g fill="none" stroke="#FF652F" stroke-width="1.6" opacity="0.42">
    <!-- source (x=236,y=205, card right edge) -> workers (x=408) -->
    <path id="s1" d="M236 205 C 320 170, 340 130, 408 130"/>
    <path id="s2" d="M236 205 C 320 195, 340 180, 408 180"/>
    <path id="s3" d="M236 205 C 320 215, 340 230, 408 230"/>
    <path id="s4" d="M236 205 C 320 240, 340 280, 408 280"/>
    <!-- workers (x=640) -> converge at arrow base (x=781) -> readme edge (x=792,y=205) -->
    <path id="w1" d="M640 130 C 700 130, 724 170, 781 205"/>
    <path id="w2" d="M640 180 C 700 180, 724 195, 781 205"/>
    <path id="w3" d="M640 230 C 700 230, 724 215, 781 205"/>
    <path id="w4" d="M640 280 C 700 280, 724 240, 781 205"/>
    <!-- readme (x=940) -> rendered (x=1004,y=205) -->
    <path id="rf" d="M940 205 L 993 205"/>
  </g>

  <!-- arrowheads at convergence + final -->
  <g class="enter e4" fill="#FF652F" opacity="0.7">
    <path d="M792 205 L 781 199 L 781 211 Z"/>
    <path d="M1004 205 L 993 199 L 993 211 Z"/>
  </g>

  <!-- ===================== FLOWING DOTS ===================== -->
  <g>
    <circle r="3" fill="#FFC857"><animateMotion dur="3.0s" begin="0s"  repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#s1" xlink:href="#s1"/></animateMotion></circle>
    <circle r="3" fill="#FF652F"><animateMotion dur="3.2s" begin=".4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#s2" xlink:href="#s2"/></animateMotion></circle>
    <circle r="3" fill="#FFC857"><animateMotion dur="3.1s" begin=".8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#s3" xlink:href="#s3"/></animateMotion></circle>
    <circle r="3" fill="#FF652F"><animateMotion dur="3.4s" begin="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#s4" xlink:href="#s4"/></animateMotion></circle>

    <circle r="3" fill="#FF652F"><animateMotion dur="2.8s" begin=".6s"  repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#w1" xlink:href="#w1"/></animateMotion></circle>
    <circle r="3" fill="#FF652F"><animateMotion dur="2.9s" begin="1.0s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#w2" xlink:href="#w2"/></animateMotion></circle>
    <circle r="3" fill="#FF652F"><animateMotion dur="2.7s" begin="1.4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#w3" xlink:href="#w3"/></animateMotion></circle>
    <circle r="3" fill="#FF652F"><animateMotion dur="3.0s" begin="1.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;1" keySplines=".4 0 .6 1"><mpath href="#w4" xlink:href="#w4"/></animateMotion></circle>

    <circle r="3" fill="#3FB950"><animateMotion dur="2.6s" begin="1.2s" repeatCount="indefinite"><mpath href="#rf" xlink:href="#rf"/></animateMotion></circle>
  </g>

  <!-- ===================== SOURCE NODE ===================== -->
  <g class="enter e1">
    <circle cx="148" cy="205" r="70" fill="url(#glowOrange)" class="pulse"/>
    <rect x="60" y="170" width="176" height="70" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <rect x="60" y="170" width="4" height="70" rx="2" fill="url(#accGrad)"/>
    <text x="80" y="200" class="body ntitle">⏱ GitHub Actions</text>
    <text x="80" y="222" class="mono nmonoAcc">cron · scheduled</text>
  </g>

  <!-- ===================== WORKER NODES ===================== -->
  <!-- worker card: x 408..640 (w=232,h=40), centred on y -->
  <g class="enter e2">
    <rect x="408" y="110" width="232" height="40" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <circle cx="426" cy="130" r="3.5" fill="#FFC857"/>
    <text x="440" y="127" class="body ntitle">WakaTime → Coding Time</text>
    <text x="440" y="141" class="mono nmono">daily-language-time.yml</text>
  </g>
  <g class="enter e3">
    <rect x="408" y="160" width="232" height="40" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <circle cx="426" cy="180" r="3.5" fill="#FF652F"/>
    <text x="440" y="177" class="body ntitle">Activity Feed</text>
    <text x="440" y="191" class="mono nmono">recent-activity.yml</text>
  </g>
  <g class="enter e4">
    <rect x="408" y="210" width="232" height="40" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <circle cx="426" cy="230" r="3.5" fill="#FFC857"/>
    <text x="440" y="227" class="body ntitle">Auto-Pin Top Repos</text>
    <text x="440" y="241" class="mono nmono">auto-pin-top-repos.yml</text>
  </g>
  <g class="enter e5">
    <rect x="408" y="260" width="232" height="40" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <circle cx="426" cy="280" r="3.5" fill="#FF652F"/>
    <text x="440" y="277" class="body ntitle">Experience Metric</text>
    <text x="440" y="291" class="mono nmono">update-experience.yml</text>
  </g>

  <!-- ===================== README NODE ===================== -->
  <g class="enter e5">
    <rect x="792" y="175" width="148" height="60" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <rect x="792" y="175" width="4" height="60" rx="2" fill="url(#accGrad)"/>
    <text x="812" y="201" class="body ntitle">README.md</text>
    <text x="812" y="221" class="mono nmono">git commit · push</text>
  </g>

  <!-- ===================== RENDERED NODE ===================== -->
  <g class="enter e6">
    <circle cx="1084" cy="205" r="66" fill="url(#glowGreen)" class="pulse"/>
    <rect x="1004" y="175" width="152" height="60" rx="12" fill="#111827" stroke="#243042" filter="url(#soft)"/>
    <rect x="1004" y="175" width="4" height="60" rx="2" fill="#3FB950"/>
    <text x="1024" y="201" class="body ntitle">Rendered Profile</text>
    <g>
      <circle cx="1030" cy="216" r="7" fill="#3FB950" opacity=".18"/>
      <path d="M1027 216 l 2.2 2.4 l 4.4 -5" fill="none" stroke="#3FB950" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="1044" y="221" class="mono nmono" fill="#3FB950">build passing</text>
  </g>
</svg>
