      <stop offset="55%" stop-color="#FBFCFD"/>
      <stop offset="100%" stop-color="#F6F8FA"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#D8DEE4" stroke-width="0.6"/>
    </pattern>
    <radialGradient id="glowA" cx="12%" cy="0%" r="55%">
      <stop offset="0%"  stop-color="#FF652F" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#FF652F" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FF652F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="88%" cy="8%" r="55%">
      <stop offset="0%"  stop-color="#0969DA" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#0969DA" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#0969DA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="100%" r="60%">
      <stop offset="0%"  stop-color="#D98324" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#D98324" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#D98324" stop-opacity="0"/>
    </radialGradient>

    <!-- Editor panel gradient with slow drift -->
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F6F8FA"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-90 0" to="90 0" dur="18s" begin="0.6s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Accent shimmer (orange -> amber) -->
    <linearGradient id="acc" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF652F"/>
      <stop offset="50%" stop-color="#D98324"/>
      <stop offset="100%" stop-color="#FF652F"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-240 0" to="240 0" dur="8s" begin="1.2s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0C1A25" flood-opacity="0.16"/>
    </filter>

    <clipPath id="win"><rect x="40" y="30" width="1120" height="780" rx="18"/></clipPath>
    <clipPath id="bgClip"><rect width="1200" height="840" rx="16"/></clipPath>
  </defs>

  <!-- ===== Backdrop (clipped to rounded card shape) ===== -->
