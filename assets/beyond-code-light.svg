<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="beyond-the-code — MuhammadAbdullah.cs. An immutable C# record: Role, Full-Stack Software Engineer. Education, First-Class BSc (Hons). Philosophy, if it's structured, it can be automated. Off the clock: happiest at the wheel of an HGV, one day a pilot's licence, husband and father first. DailyRoutine loops forever: coffee and code, learn something new, build and automate, share what I learn." viewBox="0 0 1200 840" width="1200" height="840" preserveAspectRatio="xMidYMid meet" text-rendering="geometricPrecision">
  <title>Beyond the Code — the human behind the commits</title>
  <desc>A light IDE window rendering a syntax-highlighted C# record describing Muhammad Abdullah beyond his work: role, education, philosophy, life off the clock, and an infinite daily routine of coffee, learning, building and sharing.</desc>

  <style>
    @media (prefers-reduced-motion: reduce){ * { animation:none !important; transition:none !important } }
