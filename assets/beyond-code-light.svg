    <line x1="92" y1="126" x2="92" y2="756" stroke="#D8DEE4" stroke-width="1" opacity="0.9"/>
    <g class="mono" font-size="12.5" fill="#9CA6B0" text-anchor="end">
      <text x="78" y="150">1</text><text x="78" y="172">2</text><text x="78" y="194">3</text><text x="78" y="216">4</text>
      <text x="78" y="238">5</text><text x="78" y="260">6</text><text x="78" y="282">7</text><text x="78" y="304">8</text>
      <text x="78" y="326">9</text><text x="78" y="348">10</text><text x="78" y="370">11</text><text x="78" y="392">12</text>
      <text x="78" y="414">13</text><text x="78" y="436">14</text><text x="78" y="458">15</text><text x="78" y="480">16</text>
      <text x="78" y="502">17</text><text x="78" y="524">18</text><text x="78" y="546">19</text><text x="78" y="568">20</text>
      <text x="78" y="590">21</text><text x="78" y="612">22</text><text x="78" y="634">23</text><text x="78" y="656">24</text>
      <text x="78" y="678">25</text><text x="78" y="700">26</text><text x="78" y="722">27</text><text x="78" y="744">28</text>
    </g>
  </g>

  <!-- ===== Code ===== -->
  <g class="mono" font-size="15">

    <!-- header · namespace · record declaration -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.45s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="0.45s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="150" xml:space="preserve" fill="#6E7781">// .NET 10 · C# 14 · &lt;Nullable&gt;enable&lt;/Nullable&gt; · warnings as errors</text>
      <text x="112" y="172" xml:space="preserve"><tspan fill="#CF222E">namespace</tspan><tspan fill="#953800"> ProfileCard</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="216" xml:space="preserve"><tspan fill="#8C959F">/// &lt;summary&gt;</tspan><tspan fill="#6E7781"> Immutable by design — the values below never mutate at runtime. </tspan><tspan fill="#8C959F">&lt;/summary&gt;</tspan></text>
      <text x="112" y="238" xml:space="preserve"><tspan fill="#CF222E">public sealed record</tspan><tspan fill="#953800"> MuhammadAbdullah</tspan></text>
      <text x="112" y="260" xml:space="preserve" fill="#1F2328">{</text>
    </g>

    <!-- properties -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.65s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="0.65s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="282" xml:space="preserve"><tspan fill="#CF222E">    public string</tspan><tspan fill="#0550AE"> Role       </tspan><tspan fill="#CF222E">=&gt;</tspan><tspan fill="#0A3069"> "Full-Stack Software Engineer"</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="304" xml:space="preserve"><tspan fill="#CF222E">    public string</tspan><tspan fill="#0550AE"> Education  </tspan><tspan fill="#CF222E">=&gt;</tspan><tspan fill="#0A3069"> "First-Class BSc (Hons)"</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="326" xml:space="preserve"><tspan fill="#CF222E">    public string</tspan><tspan fill="#0550AE"> Philosophy </tspan><tspan fill="#CF222E">=&gt;</tspan><tspan fill="#0A3069"> "If it's structured, it can be automated."</tspan><tspan fill="#1F2328">;</tspan></text>
    </g>

    <!-- off the clock -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.85s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="0.85s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="370" xml:space="preserve"><tspan fill="#CF222E">    public</tspan><tspan fill="#953800"> IReadOnlyList</tspan><tspan fill="#1F2328">&lt;</tspan><tspan fill="#CF222E">string</tspan><tspan fill="#1F2328">&gt;</tspan><tspan fill="#0550AE"> OffTheClock</tspan><tspan fill="#1F2328"> { </tspan><tspan fill="#CF222E">get</tspan><tspan fill="#1F2328">; } =</tspan></text>
      <text x="112" y="392" xml:space="preserve" fill="#1F2328">    [</text>
      <text x="112" y="414" xml:space="preserve"><tspan fill="#0A3069">        "🚚 Happiest at the wheel of an HGV"</tspan><tspan fill="#1F2328">,</tspan></text>
      <text x="112" y="436" xml:space="preserve"><tspan fill="#0A3069">        "✈️ One day — a pilot's licence"</tspan><tspan fill="#1F2328">,</tspan></text>
      <text x="112" y="458" xml:space="preserve"><tspan fill="#0A3069">        "👨‍👩‍👧 Husband &amp; father first"</tspan><tspan fill="#1F2328">,</tspan></text>
      <text x="112" y="480" xml:space="preserve" fill="#1F2328">    ];</text>
    </g>

    <!-- daily routine -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.05s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="1.05s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="524" xml:space="preserve"><tspan fill="#CF222E">    public</tspan><tspan fill="#953800"> IEnumerable</tspan><tspan fill="#1F2328">&lt;</tspan><tspan fill="#CF222E">string</tspan><tspan fill="#1F2328">&gt;</tspan><tspan fill="#8250DF"> DailyRoutine</tspan><tspan fill="#1F2328">()</tspan></text>
      <text x="112" y="546" xml:space="preserve" fill="#1F2328">    {</text>
      <text x="112" y="568" xml:space="preserve"><tspan fill="#CF222E">        while</tspan><tspan fill="#1F2328"> (</tspan><tspan fill="#0550AE">true</tspan><tspan fill="#1F2328">)  </tspan><tspan fill="#6E7781">// no exit condition — by design</tspan></text>
      <text x="112" y="590" xml:space="preserve" fill="#1F2328">        {</text>
    </g>

    <!-- yields (the cycling lines) -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.25s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="1.25s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="612" xml:space="preserve"><tspan fill="#CF222E">            yield return</tspan><tspan fill="#0A3069"> "☕ Coffee + code"</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="634" xml:space="preserve"><tspan fill="#CF222E">            yield return</tspan><tspan fill="#0A3069"> "🧠 Learn something new"</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="656" xml:space="preserve"><tspan fill="#CF222E">            yield return</tspan><tspan fill="#0A3069"> "🔧 Build &amp; automate"</tspan><tspan fill="#1F2328">;</tspan></text>
      <text x="112" y="678" xml:space="preserve"><tspan fill="#CF222E">            yield return</tspan><tspan fill="#0A3069"> "📚 Share what I learn"</tspan><tspan fill="#1F2328">;</tspan></text>
    </g>

    <!-- closing braces -->
    <g opacity="0" transform="translate(8 0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.45s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <animateTransform attributeName="transform" type="translate" from="8 0" to="0 0" dur="0.45s" begin="1.45s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
      <text x="112" y="700" xml:space="preserve" fill="#1F2328">        }</text>
      <text x="112" y="722" xml:space="preserve" fill="#1F2328">    }</text>
      <text x="112" y="744" xml:space="preserve" fill="#1F2328">}</text>
    </g>

    <!-- caret at end of file -->
    <rect x="124" y="730" width="2.5" height="18" fill="#1F2328" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.5;0.5;1" dur="1.1s" begin="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

