  <rect width="1200" height="840" fill="url(#sky)"/>
  <rect width="1200" height="840" fill="url(#grid)" opacity="0.35"/>
  <rect width="1200" height="840" fill="url(#glowA)"/>
  <rect width="1200" height="840" fill="url(#glowB)"/>
  <rect width="1200" height="840" fill="url(#glowC)"/>
  </g>

  <!-- ===== Editor window ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="1120" height="780" rx="18" fill="url(#panel)"/>
  </g>

  <g clip-path="url(#win)">
    <!-- tab strip -->
    <rect x="40" y="78" width="1120" height="38" fill="#F1F4F7"/>
