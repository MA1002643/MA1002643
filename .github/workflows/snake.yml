name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */24 * * *" # once a day
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Render the contribution graph as a snake game, brand-matched
      # (orange snake) for both dark and light themes.
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23FF652F
            dist/github-snake.svg?color_snake=%23FF652F&color_dots=%23ebedf0,%23ffd9b0,%23ffb37a,%23ff8a4c,%23ff652f

      # Push the generated assets to a dedicated `output` branch.
      # The README references them via raw.githubusercontent.com on that branch.
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
