name: Update recent activity

on:
    workflow_dispatch:
    schedule:
        - cron: "0 8 * * *" # daily 08:00 UTC

permissions:
    contents: write

concurrency:
    group: recent-activity
    cancel-in-progress: false

jobs:
    update:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            # Renders assets/activity-feed-{dark,light}.svg from the GitHub
            # Events + GraphQL APIs and refreshes the README block between the
            # RECENT_ACTIVITY markers. Retried to survive transient API 5xx.
            - name: Build activity feed cards (retry on 5xx)
              uses: nick-fields/retry@v3
              env:
                  GH_TOKEN: ${{ secrets.ACTIVITY_GH_TOKEN || secrets.GITHUB_TOKEN }}
                  GH_USERNAME: MA1002643
              with:
                  max_attempts: 4
                  timeout_minutes: 5
                  command: node .github/scripts/recent-activity.mjs

            - name: Commit changes
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "docs: update recent activity"
                  file_pattern: |
                      README.md
                      assets/activity-feed-*.svg
                      .github/activity-cache.json
