name: Daily Language Time

on:
  schedule:
    - cron: "0 7 * * *" # 08:00 when London is UTC+1 (BST)
    - cron: "0 8 * * *" # 08:00 when London is UTC+0 (GMT)
  workflow_dispatch: {}

permissions:
  contents: write

env:
  TZ: Europe/London

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build lang-time card + README section from WakaTime (rolling window, Europe/London)
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          WAKATIME_USER: ${{ secrets.WAKATIME_USER }} # can be unset or empty
        run: python .github/scripts/daily_language_time.py

      - name: Remove legacy header line from README (optional)
        run: |
          if [ -f README.md ]; then
            sed -i'' '/^Last update: auto at 08:00 AM everyday, showing yesterday$/d' README.md || true
          fi

      - name: Commit & push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/lang-time-dark.svg assets/lang-time-light.svg
          git commit -m "chore: update language time (show today if included; keep 7-day span)"
          git push
